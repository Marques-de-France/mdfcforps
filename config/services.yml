services:
  # Module main class
  mdfcforps.module:
    class: Mdfcforps
    public: true

  # Services
  mdfcforps.hub_client:
    class: Mdfcforps\Service\HubClient
    file: '%kernel.project_dir%/modules/mdfcforps/src/Service/HubClient.php'
    public: true

  mdfcforps.attribution_service:
    class: Mdfcforps\Service\AttributionService
    file: '%kernel.project_dir%/modules/mdfcforps/src/Service/AttributionService.php'
    public: true

  mdfcforps.feed_eligibility_service:
    class: Mdfcforps\Service\FeedEligibilityService
    file: '%kernel.project_dir%/modules/mdfcforps/src/Service/FeedEligibilityService.php'
    arguments:
      - "@=service('prestashop.adapter.legacy.configuration').get('PS_ORDER_OUT_OF_STOCK')"
    public: true

  mdfcforps.feed_service:
    class: Mdfcforps\Service\FeedService
    file: '%kernel.project_dir%/modules/mdfcforps/src/Service/FeedService.php'
    arguments:
      - '@mdfcforps.feed_eligibility_service'
    public: true

  mdfcforps.feed_products_service:
    class: Mdfcforps\Service\FeedProductsService
    file: '%kernel.project_dir%/modules/mdfcforps/src/Service/FeedProductsService.php'
    public: true

  # Repository
  mdfcforps.sale_repository:
    class: Mdfcforps\Repository\SaleRepository
    file: '%kernel.project_dir%/modules/mdfcforps/src/Repository/SaleRepository.php'
    public: true

  # Installer
  mdfcforps.installer:
    class: Mdfcforps\Install\Installer
    file: '%kernel.project_dir%/modules/mdfcforps/src/Install/Installer.php'
    arguments:
      - '@mdfcforps.module'
    public: true

  # -------------------------------------------------------------------------
  # Symfony Feed Controller
  # -------------------------------------------------------------------------
  mdfcforps.controller.admin.feed:
    class: Mdfcforps\Controller\Admin\FeedController
    file: '%kernel.project_dir%/modules/mdfcforps/src/Controller/Admin/FeedController.php'
    # @twig is injected via constructor (not fetched at runtime) for PS9/Symfony 6 compatibility.
    # In Symfony 6, 'twig' is a private/inlined service — DI injection works, container::get() does not.
    arguments:
      - '@twig'
    calls:
      - [setContainer, ['@service_container']]
    public: true

  # -------------------------------------------------------------------------
  # ProductFeed Grid (products currently in feed)
  # -------------------------------------------------------------------------
  mdfcforps.grid.query_builder.product_feed:
    class: Mdfcforps\Grid\Query\ProductFeedQueryBuilder
    file: '%kernel.project_dir%/modules/mdfcforps/src/Grid/Query/ProductFeedQueryBuilder.php'
    parent: prestashop.core.grid.abstract_query_builder
    arguments:
      - "@=service('prestashop.adapter.legacy.context').getContext().language.id"
      - "@=service('prestashop.adapter.legacy.context').getContext().shop.id"
      - '@mdfcforps.feed_eligibility_service'
    public: true

  mdfcforps.grid.definition.factory.product_feed:
    class: Mdfcforps\Grid\Definition\Factory\ProductFeedGridDefinitionFactory
    file: '%kernel.project_dir%/modules/mdfcforps/src/Grid/Definition/Factory/ProductFeedGridDefinitionFactory.php'
    parent: prestashop.core.grid.definition.factory.abstract_grid_definition
    public: true

  mdfcforps.grid.data_factory.product_feed:
    class: '%prestashop.core.grid.data.factory.doctrine_grid_data_factory%'
    arguments:
      - '@mdfcforps.grid.query_builder.product_feed'
      - '@prestashop.core.hook.dispatcher'
      - '@prestashop.core.grid.query.doctrine_query_parser'
      - 'product_feed'
    public: true

  mdfcforps.grid.data_factory.product_feed_decorated:
    class: Mdfcforps\Grid\Data\ProductFeedDataDecorator
    file: '%kernel.project_dir%/modules/mdfcforps/src/Grid/Data/ProductFeedDataDecorator.php'
    arguments:
      - '@mdfcforps.grid.data_factory.product_feed'
    public: true

  mdfcforps.grid.factory.product_feed:
    class: PrestaShop\PrestaShop\Core\Grid\GridFactory
    arguments:
      - '@mdfcforps.grid.definition.factory.product_feed'
      - '@mdfcforps.grid.data_factory.product_feed_decorated'
      - '@prestashop.core.grid.filter.form_factory'
      - '@prestashop.core.hook.dispatcher'
    public: true

  # -------------------------------------------------------------------------
  # ProductCatalog Grid (manage panel – all products with in_feed flag)
  # -------------------------------------------------------------------------
  mdfcforps.grid.query_builder.product_catalog:
    class: Mdfcforps\Grid\Query\ProductCatalogQueryBuilder
    file: '%kernel.project_dir%/modules/mdfcforps/src/Grid/Query/ProductCatalogQueryBuilder.php'
    parent: prestashop.core.grid.abstract_query_builder
    arguments:
      - "@=service('prestashop.adapter.legacy.context').getContext().language.id"
      - "@=service('prestashop.adapter.legacy.context').getContext().shop.id"
      - '@mdfcforps.feed_eligibility_service'
    public: true

  mdfcforps.grid.definition.factory.product_catalog:
    class: Mdfcforps\Grid\Definition\Factory\ProductCatalogGridDefinitionFactory
    file: '%kernel.project_dir%/modules/mdfcforps/src/Grid/Definition/Factory/ProductCatalogGridDefinitionFactory.php'
    parent: prestashop.core.grid.definition.factory.abstract_grid_definition
    public: true

  mdfcforps.grid.data_factory.product_catalog:
    class: '%prestashop.core.grid.data.factory.doctrine_grid_data_factory%'
    arguments:
      - '@mdfcforps.grid.query_builder.product_catalog'
      - '@prestashop.core.hook.dispatcher'
      - '@prestashop.core.grid.query.doctrine_query_parser'
      - 'product_catalog'
    public: true

  mdfcforps.grid.data_factory.product_catalog_decorated:
    class: Mdfcforps\Grid\Data\ProductCatalogDataDecorator
    file: '%kernel.project_dir%/modules/mdfcforps/src/Grid/Data/ProductCatalogDataDecorator.php'
    arguments:
      - '@mdfcforps.grid.data_factory.product_catalog'
    public: true

  mdfcforps.grid.factory.product_catalog:
    class: PrestaShop\PrestaShop\Core\Grid\GridFactory
    arguments:
      - '@mdfcforps.grid.definition.factory.product_catalog'
      - '@mdfcforps.grid.data_factory.product_catalog_decorated'
      - '@prestashop.core.grid.filter.form_factory'
      - '@prestashop.core.hook.dispatcher'
    public: true

  # -------------------------------------------------------------------------
  # Sales Grid
  # -------------------------------------------------------------------------
  mdfcforps.grid.query_builder.sales:
    class: Mdfcforps\Grid\Query\SalesQueryBuilder
    file: '%kernel.project_dir%/modules/mdfcforps/src/Grid/Query/SalesQueryBuilder.php'
    parent: prestashop.core.grid.abstract_query_builder
    public: true

  mdfcforps.grid.definition.factory.sales:
    class: Mdfcforps\Grid\Definition\Factory\SalesGridDefinitionFactory
    file: '%kernel.project_dir%/modules/mdfcforps/src/Grid/Definition/Factory/SalesGridDefinitionFactory.php'
    parent: prestashop.core.grid.definition.factory.abstract_grid_definition
    public: true

  mdfcforps.grid.data_factory.sales:
    class: Mdfcforps\Grid\Data\HubSalesDataFactory
    file: '%kernel.project_dir%/modules/mdfcforps/src/Grid/Data/HubSalesDataFactory.php'
    arguments:
      - '@mdfcforps.hub_client'
    public: true

  mdfcforps.grid.data_factory.sales_decorated:
    class: Mdfcforps\Grid\Data\SalesDataDecorator
    file: '%kernel.project_dir%/modules/mdfcforps/src/Grid/Data/SalesDataDecorator.php'
    arguments:
      - '@mdfcforps.grid.data_factory.sales'
    public: true

  mdfcforps.grid.factory.sales:
    class: PrestaShop\PrestaShop\Core\Grid\GridFactory
    arguments:
      - '@mdfcforps.grid.definition.factory.sales'
      - '@mdfcforps.grid.data_factory.sales_decorated'
      - '@prestashop.core.grid.filter.form_factory'
      - '@prestashop.core.hook.dispatcher'
    public: true

