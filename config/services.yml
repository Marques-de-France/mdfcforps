services:
  # Module main class
  mdfcforps.module:
    class: Mdfcforps
    public: true

  # Services
  mdfcforps.hub_client:
    class: Mdfcforps\Service\HubClient
    public: true

  mdfcforps.attribution_service:
    class: Mdfcforps\Service\AttributionService
    public: true

  mdfcforps.feed_eligibility_service:
    class: Mdfcforps\Service\FeedEligibilityService
    arguments:
      - "@=service('prestashop.adapter.legacy.configuration').get('PS_ORDER_OUT_OF_STOCK')"
    public: true

  mdfcforps.feed_service:
    class: Mdfcforps\Service\FeedService
    arguments:
      - '@mdfcforps.feed_eligibility_service'
    public: true

  mdfcforps.feed_products_service:
    class: Mdfcforps\Service\FeedProductsService
    public: true

  # Repository
  mdfcforps.sale_repository:
    class: Mdfcforps\Repository\SaleRepository
    public: true

  # Installer
  mdfcforps.installer:
    class: Mdfcforps\Install\Installer
    arguments:
      - '@mdfcforps.module'
    public: true

  # -------------------------------------------------------------------------
  # Symfony Feed Controller
  # -------------------------------------------------------------------------
  # Symfony Feed Controller — explicit constructor injection (two GridFactory args can't be autowired)
  Mdfcforps\Controller\Admin\FeedController:
    autoconfigure: true
    arguments:
      - '@mdfcforps.grid.factory.product_feed'
      - '@mdfcforps.grid.factory.product_catalog'
    tags:
      - { name: controller.service_arguments }
    public: true

  # -------------------------------------------------------------------------
  # ProductFeed Grid (products currently in feed)
  # -------------------------------------------------------------------------
  mdfcforps.grid.query_builder.product_feed:
    class: Mdfcforps\Grid\Query\ProductFeedQueryBuilder
    parent: prestashop.core.grid.abstract_query_builder
    arguments:
      - "@=service('prestashop.adapter.legacy.context').getContext().language.id"
      - "@=service('prestashop.adapter.legacy.context').getContext().shop.id"
      - '@mdfcforps.feed_eligibility_service'
    public: true

  mdfcforps.grid.definition.factory.product_feed:
    class: Mdfcforps\Grid\Definition\Factory\ProductFeedGridDefinitionFactory
    parent: prestashop.core.grid.definition.factory.abstract_grid_definition
    public: true

  mdfcforps.grid.data_factory.product_feed:
    class: '%prestashop.core.grid.data.factory.doctrine_grid_data_factory%'
    arguments:
      - '@mdfcforps.grid.query_builder.product_feed'
      - '@prestashop.core.hook.dispatcher'
      - '@prestashop.core.grid.query.doctrine_query_parser'
      - 'product_feed'
    public: true

  mdfcforps.grid.data_factory.product_feed_decorated:
    class: Mdfcforps\Grid\Data\ProductFeedDataDecorator
    arguments:
      - '@mdfcforps.grid.data_factory.product_feed'
    public: true

  mdfcforps.grid.factory.product_feed:
    class: PrestaShop\PrestaShop\Core\Grid\GridFactory
    arguments:
      - '@mdfcforps.grid.definition.factory.product_feed'
      - '@mdfcforps.grid.data_factory.product_feed_decorated'
      - '@prestashop.core.grid.filter.form_factory'
      - '@prestashop.core.hook.dispatcher'
    public: true

  # -------------------------------------------------------------------------
  # ProductCatalog Grid (manage panel – all products with in_feed flag)
  # -------------------------------------------------------------------------
  mdfcforps.grid.query_builder.product_catalog:
    class: Mdfcforps\Grid\Query\ProductCatalogQueryBuilder
    parent: prestashop.core.grid.abstract_query_builder
    arguments:
      - "@=service('prestashop.adapter.legacy.context').getContext().language.id"
      - "@=service('prestashop.adapter.legacy.context').getContext().shop.id"
      - '@mdfcforps.feed_eligibility_service'
    public: true

  mdfcforps.grid.definition.factory.product_catalog:
    class: Mdfcforps\Grid\Definition\Factory\ProductCatalogGridDefinitionFactory
    parent: prestashop.core.grid.definition.factory.abstract_grid_definition
    public: true

  mdfcforps.grid.data_factory.product_catalog:
    class: '%prestashop.core.grid.data.factory.doctrine_grid_data_factory%'
    arguments:
      - '@mdfcforps.grid.query_builder.product_catalog'
      - '@prestashop.core.hook.dispatcher'
      - '@prestashop.core.grid.query.doctrine_query_parser'
      - 'product_catalog'
    public: true

  mdfcforps.grid.data_factory.product_catalog_decorated:
    class: Mdfcforps\Grid\Data\ProductCatalogDataDecorator
    arguments:
      - '@mdfcforps.grid.data_factory.product_catalog'
    public: true

  mdfcforps.grid.factory.product_catalog:
    class: PrestaShop\PrestaShop\Core\Grid\GridFactory
    arguments:
      - '@mdfcforps.grid.definition.factory.product_catalog'
      - '@mdfcforps.grid.data_factory.product_catalog_decorated'
      - '@prestashop.core.grid.filter.form_factory'
      - '@prestashop.core.hook.dispatcher'
    public: true

