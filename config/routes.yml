mdfcforps_dashboard_index:
    path: /mdfcforps/dashboard
    methods: [GET]
    defaults:
        _controller: 'mdfcforps.controller.admin.feed::dashboardAction'
        _legacy_controller: AdminMdfcforps
        _legacy_link:
            - AdminMdfcforps
            - AdminMdfcforps:dashboard

mdfcforps_sales_index:
    path: /mdfcforps/sales
    methods: [GET, POST]
    defaults:
