mdfcforps_dashboard_index:
    path: /mdfcforps/dashboard
    methods: [GET]
    defaults:
        _controller: 'Mdfcforps\Controller\Admin\FeedController::dashboardAction'
        _legacy_controller: AdminMdfcforps
        _legacy_link:
            - AdminMdfcforps
            - AdminMdfcforps:dashboard

mdfcforps_sales_index:
    path: /mdfcforps/sales
    methods: [GET, POST]
    defaults:
        _controller: 'Mdfcforps\Controller\Admin\FeedController::salesAction'
        _legacy_controller: AdminMdfcforps
        _legacy_link:
            - AdminMdfcforps:sales

mdfcforps_feed_index:
    path: /mdfcforps/feed
    methods: [GET, POST]
    defaults:
        _controller: 'Mdfcforps\Controller\Admin\FeedController::indexAction'
        _legacy_controller: AdminMdfcforps
        _legacy_link:
            - AdminMdfcforps:feed

mdfcforps_feed_toggle:
    path: /mdfcforps/feed/toggle
    methods: [POST]
    defaults:
        _controller: 'Mdfcforps\Controller\Admin\FeedController::toggleAction'
        _legacy_controller: AdminMdfcforps

mdfcforps_feed_bulk:
    path: /mdfcforps/feed/bulk
    methods: [POST]
    defaults:
        _controller: 'Mdfcforps\Controller\Admin\FeedController::bulkAction'
